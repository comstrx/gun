[workspace]
name = "demo"
version = "0.1.0"
description = "this is a demo"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
channels = ["https://conda.modular.com/max/", "conda-forge"]

[tasks]
build = "mkdir -p build/debug && mojo build -O0 -g2 src/main.mojo -o build/debug/demo"
build-release = "mkdir -p build/release && mojo build -O3 -g0 src/main.mojo -o build/release/demo"
run = { cmd = "./build/debug/demo", depends-on = ["build"] }
run-release = { cmd = "./build/release/demo", depends-on = ["build-release"] }

[dependencies]
mojo = "*"
