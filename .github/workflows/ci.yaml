name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-bash
            os: ubuntu-latest
            bash_path: bash

          - name: macos-bash
            os: macos-latest
            bash_path: /opt/homebrew/bin/bash

          - name: windows-gitbash
            os: windows-latest
            bash_path: bash

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modern bash on macOS
        if: runner.os == 'macOS'
        run: |
          brew install bash
          /opt/homebrew/bin/bash --version

      - name: Show environment
        run: |
          "${{ matrix.bash_path }}" --version || true
          uname -a || true
        shell: bash

      - name: Normalize line endings
        run: |
          git config --global core.autocrlf false || true
          git config --global core.eol lf || true
        shell: bash

      - name: Debug loaded files
        run: |
          pwd
          ls -la tool/parts/builtin || true
          echo '--- user.sh definitions ---'
          grep -n '^sys::ugroup ()' tool/parts/builtin/user.sh || true
          grep -n '^sys::groups ()' tool/parts/builtin/user.sh || true
          grep -n '^sys::uexists ()' tool/parts/builtin/user.sh || true
          echo '--- test.sh source lines ---'
          sed -n '1,40p' tool/parts/builtin/test.sh || true
        shell: bash

      - name: Debug duplicate functions
        run: |
          echo '--- duplicate check ---'
          grep -n '^sys::ugroup ()' tool/parts/builtin/user.sh || true
          grep -n '^sys::groups ()' tool/parts/builtin/user.sh || true
          grep -n '^sys::uexists ()' tool/parts/builtin/user.sh || true
          grep -n '^sys::gname ()' tool/parts/builtin/user.sh || true
        shell: bash

      - name: Make scripts executable
        if: runner.os != 'Windows'
        run: |
          chmod +x tool/parts/builtin/test.sh || true
        shell: bash

      - name: Debug builtin files
        run: |
          pwd
          ls -la tool/parts/builtin || true

          echo '--- user.sh duplicate check ---'
          grep -n '^sys::ugroup ()' tool/parts/builtin/user.sh || true
          grep -n '^sys::groups ()' tool/parts/builtin/user.sh || true
          grep -n '^sys::uexists ()' tool/parts/builtin/user.sh || true
          grep -n '^sys::gname ()' tool/parts/builtin/user.sh || true

          echo '--- user.sh snippets ---'
          sed -n '/^sys::ugroup (),/^}/p' tool/parts/builtin/user.sh || true
          sed -n '/^sys::groups (),/^}/p' tool/parts/builtin/user.sh || true
          sed -n '/^sys::uexists (),/^}/p' tool/parts/builtin/user.sh || true
          sed -n '/^sys::gname (),/^}/p' tool/parts/builtin/user.sh || true

          echo '--- run test ---'
          "${{ matrix.bash_path }}" tool/parts/builtin/test.sh
        shell: bash
