name: ci

on:
  workflow_dispatch:

  push:
    branches: ['main']

  pull_request:
    branches: ['main']

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest]

        steps:
            - uses: actions/checkout@v6
            - uses: actions-rust-lang/setup-rust-toolchain@v1

            - run: cargo run
