name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-bash
            os: ubuntu-latest
            shell: bash

          - name: macos-bash
            os: macos-latest
            shell: bash

          - name: windows-gitbash
            os: windows-latest
            shell: bash

    defaults:
      run:
        shell: ${{ matrix.shell }}

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          echo "runner.os=${RUNNER_OS}"
          echo "shell=${SHELL:-unknown}"
          echo "ostype=${OSTYPE:-unknown}"
          uname -a || true
          bash --version || true

      - name: Normalize line endings
        run: |
          git config --global core.autocrlf false || true
          git config --global core.eol lf || true

      - name: Make scripts executable
        if: runner.os != 'Windows'
        run: |
          chmod +x tool/parts/builtin/test.sh || true

      - name: Run builtin tests
        run: |
          bash tool/parts/builtin/test.sh

      - name: Run builtin tests with timing
        run: |
          time bash tool/parts/builtin/test.sh
